services:
  - type: web
    name: django-ngrok-proxy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn proxy_server.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "django-ngrok-proxy.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://django-ngrok-proxy.onrender.com"
      - key: NGROK_API_BASE
        sync: false
